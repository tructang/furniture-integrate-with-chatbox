version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: demochatbox-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: demochatbox
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d demochatbox"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
